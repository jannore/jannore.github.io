const fs = require("fs");
const path = require("path");

const MEDIA_DIR = path.join(process.cwd(), "media");
const OUT_FILE = path.join(process.cwd(), "media_index.json");

const allowed = new Set([".jpg", ".jpeg", ".png", ".gif", ".mp4", ".webm", ".mov"]);

function leadingNumber(name) {
  const m = String(name).match(/^(\d+)/);
  return m ? parseInt(m[1], 10) : Number.POSITIVE_INFINITY;
}

function guessType(ext) {
  ext = ext.toLowerCase();
  if (ext === ".mp4" || ext === ".webm" || ext === ".mov") return "video";
  return "image";
}

function titleFromName(name) {
  return name.replace(/\.[^/.]+$/, "");
}

function main() {
  console.log("CWD:", process.cwd());
  console.log("MEDIA_DIR:", MEDIA_DIR);

  console.log("Root listing:");
  try {
    console.log(fs.readdirSync(process.cwd(), { withFileTypes: true }).map(d => (d.isDirectory() ? "[D] " : "[F] ") + d.name).join("\n"));
  } catch (e) {
    console.error("Failed to list root:", e);
  }

  if (!fs.existsSync(MEDIA_DIR)) {
    console.error("ERROR: No media/ directory found at:", MEDIA_DIR);
    process.exit(1);
  }

  console.log("media/ listing:");
  let dirents;
  try {
    dirents = fs.readdirSync(MEDIA_DIR, { withFileTypes: true });
    console.log(dirents.map(d => (d.isDirectory() ? "[D] " : "[F] ") + d.name).join("\n"));
  } catch (e) {
    console.error("ERROR: Failed to read media/:", e);
    process.exit(1);
  }

  const files = dirents
    .filter(d => d.isFile())
    .map(d => d.name)
    .filter(name => allowed.has(path.extname(name).toLowerCase()));

  console.log("Supported media files:", files);

  if (files.length === 0) {
    console.error("ERROR: media/ exists but contains NO supported files (jpg/png/mp4/etc).");
    process.exit(1);
  }

  const items = files.map(name => {
    const ext = path.extname(name);
    return {
      type: guessType(ext),
      src: "media/" + name,
      title: titleFromName(name),
      order: leadingNumber(name)
    };
  }).sort((a, b) => {
    if (a.order !== b.order) return a.order - b.order;
    return a.title.localeCompare(b.title);
  }).map(({ order, ...rest }) => rest);

  fs.writeFileSync(OUT_FILE, JSON.stringify({ version: 1, items }, null, 2) + "\n", "utf8");
  console.log(`OK: Wrote media_index.json with ${items.length} items`);
}

main();
